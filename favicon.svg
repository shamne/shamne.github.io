<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <g transform="translate(16 16)">
    <!-- Back: small leaves (optional depth) -->
    <g fill="#5d8f4e" stroke="#3d6634" stroke-width="0.35">
      <path d="M0 5.5 C-7 10 -9 14 -8 15.5 C-5 12 -2 8 0 6.2Z"/>
      <path d="M0 5.5 C7 10 9 14 8 15.5 C5 12 2 8 0 6.2Z"/>
    </g>
    <!-- Petals sit under the seed head -->
    <g fill="#ebc934" stroke="#c9a010" stroke-width="0.35">
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(0)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(30)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(60)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(90)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(120)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(150)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(180)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(210)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(240)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(270)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(300)"/>
      <ellipse cx="0" cy="-8.2" rx="3.1" ry="9.2" transform="rotate(330)"/>
    </g>
    <!-- Seed head on top of petal bases -->
    <circle r="6.2" fill="#4a3d2e"/>
    <circle r="4.2" fill="#2a1f17"/>
  </g>
</svg>
